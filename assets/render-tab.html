<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Render PP7 Tab</title>
<style>html,body{margin:0;padding:0;background:#fff}iframe{width:100vw;height:100vh;border:0;display:block}</style>
</head>
<body>
<iframe id="frame" src="../index.html"></iframe>
<script>
const params = new URLSearchParams(location.search);
const tab = params.get('tab') || 'executive';
const frame = document.getElementById('frame');
frame.addEventListener('load', () => {
  setTimeout(() => {
    try {
      const w = frame.contentWindow;
      if (w && typeof w.showTab === 'function') {
        w.showTab(tab);
      }
      const overlay = frame.contentDocument.getElementById('loginOverlay');
      if (overlay) overlay.style.display = 'none';
      const wrapper = frame.contentDocument.getElementById('app-wrapper');
      if (wrapper) wrapper.classList.remove('content-blur');
    } catch (e) {}
  }, 1200);
});
</script>
</body>
</html>
